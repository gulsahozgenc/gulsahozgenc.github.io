media:
  - name: assets
    label: Görseller
    input: src/assets/img
    output: /assets/img
    extensions: [jpg, jpeg, png, webp, svg, gif]

settings:
  commit:
    identity: user
    templates:
      create: "İçerik eklendi: {filename}"
      update: "İçerik güncellendi: {filename}"
      delete: "İçerik silindi: {filename}"

content:
  - name: site
    label: Site Ayarları
    type: file
    path: src/_data/site.json
    format: json
    fields:
      - name: title
        label: Site adı
        type: string
        required: true
      - name: tagline
        label: Slogan / üst başlık
        type: string
      - name: description
        label: SEO açıklaması (Google'da görünen kısa metin)
        type: text
      - name: url
        label: Site adresi (URL)
        type: string
      - name: locale
        label: Locale (tr-TR)
        type: string
      - name: lang
        label: Dil kodu (tr)
        type: string
      - name: author
        label: Yazar / Site sahibi
        type: string
      - name: email
        label: İletişim e-postası
        type: string
        pattern:
          regex: "^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$"
          message: "Geçerli bir e-posta adresi girin"
      - name: socials
        label: Sosyal medya bağlantıları
        type: object
        fields:
          - name: linkedin
            label: LinkedIn URL
            type: string
          - name: youtube
            label: YouTube URL
            type: string
          - name: academia
            label: Academia.edu URL
            type: string
      - name: newsletter
        label: Bülten metinleri
        type: object
        fields:
          - name: title
            label: Bülten başlığı
            type: string
          - name: description
            label: Bülten açıklaması
            type: text
      - name: form
        label: İletişim formu ayarları
        type: object
        fields:
          - name: formspreeId
            label: Formspree form id (yoksa boş bırakın)
            type: string
            description: "formspree.io üzerinden alınan id. Sadece harf-rakam karakter, slash yok."
          - name: typeformId
            label: Typeform id (kullanılıyorsa)
            type: string

  - name: papers
    label: Akademik Yayınlar
    type: file
    path: src/_data/papers.json
    format: json
    list: true
    view:
      fields: [title, type, year]
      primary: title
      sort: year
      order: desc
    fields:
      - name: title
        label: Başlık
        type: string
        required: true
      - name: type
        label: Tür
        type: select
        required: true
        options:
          values:
            - Hakemli Makale
            - Konferans Bildirisi
            - Kitap Bölümü
            - Araştırma Notu
            - Deneme
            - Kitap
            - Söyleşi
      - name: year
        label: Yıl
        type: number
      - name: venue
        label: Yayın yeri / dergi / kitap adı
        type: string
      - name: summary
        label: Kısa özet
        type: text
      - name: icon
        label: Kart ikonu
        type: select
        options:
          values:
            - name: brain
              label: Beyin
            - name: spiral
              label: Sarmal (sonsuz döngü)
            - name: compass
              label: Pusula
            - name: eye
              label: Göz
            - name: thread
              label: İplik (bağlanma)
            - name: moon
              label: Ay (sessizlik)
      - name: url
        label: Bağlantı (PDF / DOI / makale linki)
        type: string

  - name: navigation
    label: Üst Menü (Navigasyon)
    type: file
    path: src/_data/nav.json
    format: json
    list: true
    view:
      fields: [label, href]
      primary: label
    fields:
      - name: label
        label: Menüde görünen yazı
        type: string
        required: true
      - name: href
        label: Bağlantı (#bolum-id veya tam URL)
        type: string
        required: true
